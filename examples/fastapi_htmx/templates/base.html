<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Optional my-usermanager FastAPI HTMX Basecoat example.">
    <title>{% block title %}my-usermanager demo{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/basecoat.cdn.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/all.min.js" defer></script>
    <script src="/auth/static/passkey.js" defer></script>
    <style>
      :root {
        color-scheme: light;
        --example-space-1: 0.25rem;
        --example-space-2: 0.5rem;
        --example-space-3: 0.75rem;
        --example-space-4: 1rem;
        --example-space-5: 1.25rem;
        --example-space-6: 1.5rem;
        --example-space-8: 2rem;
        --example-space-10: 2.5rem;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .page-shell {
        min-height: 100dvh;
      }

      .shell {
        width: min(100% - var(--example-space-8), 70rem);
        margin-inline: auto;
        padding-block: var(--example-space-6);
      }

      .auth-shell {
        width: min(100% - var(--example-space-8), 26.25rem);
        margin-inline: auto;
        padding-block: var(--example-space-10);
      }

      .stack {
        display: grid;
        gap: var(--example-space-4);
      }

      .cluster {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: var(--example-space-3);
      }

      .between {
        justify-content: space-between;
      }

      .muted-copy {
        color: hsl(var(--muted-foreground));
      }

      .htmx-indicator {
        opacity: 0;
        transform: translateY(-0.125rem);
        transition: opacity 150ms ease-out, transform 150ms ease-out;
      }

      .htmx-request .htmx-indicator,
      .htmx-request.htmx-indicator {
        opacity: 1;
        transform: translateY(0);
      }

      .skip-link {
        position: absolute;
        inset-inline-start: var(--example-space-4);
        inset-block-start: var(--example-space-4);
        transform: translateY(-200%);
      }

      .skip-link:focus {
        transform: translateY(0);
      }

      @media (prefers-reduced-motion: reduce) {
        .htmx-indicator,
        .skip-link {
          transition: none;
        }
      }
    </style>
  </head>
  <body class="bg-background text-foreground">
    <div class="page-shell">
      <a class="skip-link btn btn-secondary" href="#content">Skip to content</a>
      <header class="shell cluster between" aria-label="Application header">
        <div class="stack">
          <a class="font-semibold" href="/auth/login">my-usermanager</a>
          <p class="muted-copy">
            Demo only: host apps must add production sessions, cookies, redirects, and CSRF protection.
          </p>
        </div>
        <nav class="cluster" aria-label="Demo navigation">
          <a class="btn btn-ghost" href="/account">Account</a>
          <a class="btn btn-ghost" href="/admin/users">Users</a>
        </nav>
      </header>
      <main id="content" tabindex="-1">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
